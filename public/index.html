<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pallet Estimator</title>
<style>
  :root { --bg:#0f1216; --card:#171c23; --ink:#e7edf3; --mut:#93a1b0; --acc:#4cc38a; --line:#263039; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap { max-width:820px; margin:0 auto; padding:32px 20px 64px; }
  h1 { margin:0 0 4px; font-size:24px; }
  p.sub { margin:0 0 24px; color:var(--mut); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:20px; }
  label { display:block; font-weight:600; margin-bottom:8px; }
  textarea, input { width:100%; background:#0c0f13; color:var(--ink); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font:inherit; }
  textarea { min-height:140px; resize:vertical; }
  button { background:var(--acc); color:#04130c; border:0; border-radius:8px; padding:10px 18px; font:inherit; font-weight:700; cursor:pointer; }
  button.ghost { background:transparent; color:var(--mut); border:1px solid var(--line); font-weight:600; }
  button:disabled { opacity:.5; cursor:default; }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .pallets { font-size:40px; font-weight:800; color:var(--acc); }
  table { width:100%; border-collapse:collapse; margin-top:10px; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--mut); font-weight:600; font-size:13px; }
  .mut { color:var(--mut); }
  details summary { cursor:pointer; font-weight:600; }
  .ex { border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-top:10px; }
  .err { color:#ff6b6b; }
  .hidden { display:none; }
  hr { border:0; border-top:1px solid var(--line); }
</style>
</head>
<body>
<div class="wrap">
  <h1>📦 Pallet Estimator</h1>
  <p class="sub">Paste a material list (with dimensions / quantities). Claude estimates the pallets needed, calibrated on your saved examples.</p>

  <div class="card">
    <label for="ml">Material list</label>
    <textarea id="ml" placeholder="e.g.&#10;40x Carton A — 600x400x300mm, 12kg&#10;20x Carton B — 800x600x400mm, 25kg&#10;8x Drum 200L — 600x600x900mm, 210kg"></textarea>
    <div class="row" style="margin-top:12px">
      <button id="go">Estimate pallets</button>
      <span id="status" class="mut"></span>
    </div>
  </div>

  <div id="result" class="card hidden">
    <div class="mut">Estimated pallets</div>
    <div class="pallets" id="rp">–</div>
    <p id="rr" class="mut"></p>
    <table id="rb"></table>
  </div>

  <div class="card">
    <details>
      <summary>Worked examples (few-shot) — <span id="exCount" class="mut">0</span></summary>
      <div id="exList"></div>
      <hr style="margin:16px 0" />
      <label for="exText">Add an example — material list (free text)</label>
      <textarea id="exText" placeholder="Material list for a known pallet count..."></textarea>
      <div class="row" style="margin-top:10px">
        <input type="number" id="exPallets" placeholder="pallets" style="width:110px" />
        <input type="text" id="exNotes" placeholder="notes (optional)" style="flex:1" />
        <button class="ghost" id="exAdd">Add</button>
      </div>
    </details>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));

async function estimate() {
  const materialList = $("ml").value.trim();
  if (!materialList) return;
  $("go").disabled = true; $("status").textContent = "Estimating…"; $("status").className = "mut";
  try {
    const r = await fetch("/api/estimate", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ materialList }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "Request failed");
    $("rp").textContent = data.pallets;
    $("rr").textContent = data.reasoning || "";
    const rows = (data.breakdown || []).map((b) => `<tr><td>${esc(b.group)}</td><td>${esc(b.pallets)}</td></tr>`).join("");
    $("rb").innerHTML = rows ? `<tr><th>Group</th><th>Pallets</th></tr>${rows}` : "";
    $("result").classList.remove("hidden");
    $("status").textContent = "";
  } catch (e) {
    $("status").textContent = e.message; $("status").className = "err";
  } finally {
    $("go").disabled = false;
  }
}

async function loadExamples() {
  const r = await fetch("/api/examples");
  const list = await r.json();
  $("exCount").textContent = list.length;
  $("exList").innerHTML = list.map((ex) => {
    const body = ex.rawText || (ex.materials || []).map((m) => m.name).join(", ");
    return `<div class="ex"><div class="row" style="justify-content:space-between">
      <strong>${esc(ex.pallets)} pallet(s)</strong>
      <button class="ghost" data-del="${ex._id}">delete</button></div>
      <div class="mut" style="margin-top:6px">${esc(body)}</div>
      ${ex.notes ? `<div class="mut" style="margin-top:4px">📝 ${esc(ex.notes)}</div>` : ""}</div>`;
  }).join("") || `<p class="mut">No examples yet.</p>`;
  document.querySelectorAll("[data-del]").forEach((b) => (b.onclick = () => delExample(b.dataset.del)));
}

async function addExample() {
  const rawText = $("exText").value.trim();
  const pallets = Number($("exPallets").value);
  const notes = $("exNotes").value.trim();
  if (!rawText || !Number.isFinite(pallets)) return;
  await fetch("/api/examples", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ rawText, pallets, notes }),
  });
  $("exText").value = ""; $("exPallets").value = ""; $("exNotes").value = "";
  loadExamples();
}

async function delExample(id) {
  await fetch(`/api/examples/${id}`, { method: "DELETE" });
  loadExamples();
}

$("go").onclick = estimate;
$("exAdd").onclick = addExample;
loadExamples();
</script>
</body>
</html>
